<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#1a0f0a"/>
  <!-- Grinder body -->
  <rect x="28" y="38" width="44" height="42" rx="6" fill="#432818"/>
  <rect x="32" y="42" width="36" height="34" rx="4" fill="#261510"/>
  <!-- Hopper (top funnel) -->
  <polygon points="22,20 78,20 68,38 32,38" fill="#6b3a1f"/>
  <polygon points="26,14 74,14 78,20 22,20" fill="#8B4513"/>
  <!-- Grind slots -->
  <rect x="36" y="50" width="28" height="4" rx="2" fill="#D4813a" opacity="0.8"/>
  <rect x="36" y="59" width="28" height="4" rx="2" fill="#D4813a" opacity="0.6"/>
  <rect x="36" y="68" width="28" height="4" rx="2" fill="#D4813a" opacity="0.4"/>
  <!-- Handle -->
  <rect x="72" y="52" width="12" height="4" rx="2" fill="#8B5A2B"/>
  <circle cx="84" cy="54" r="4" fill="#D4813a"/>
  <!-- Spout -->
  <rect x="40" y="80" width="20" height="8" rx="3" fill="#6b3a1f"/>
</svg>
